<!DOCTYPE html>
<html>
<head>
  <title>Asif Expense Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>💎 Expense Tracker Pro</h1>

  <!-- First Setup -->
  <div id="setup" class="card">
    <h2>👤 First Time Setup</h2>
    <input id="name" placeholder="Enter your name">
    <input id="month" placeholder="Enter month (March)">
    <button onclick="saveUser()">Start Tracking</button>
  </div>

  <!-- Main App -->
  <div id="main" style="display:none;">

    <div class="top-bar card">
      <select id="userSelect"></select>
      <select id="monthSelect"></select>
      <button class="reset" onclick="resetAll()">Reset</button>
    </div>

    <div class="card input-card">
      <h2>➕ Add Expense</h2>
      <input id="reason" placeholder="Expense reason (Food, Transport)">
      <input id="expense" type="number" placeholder="Amount (BDT)">
      <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card total-card">
      <h2>Total Expense</h2>
      <h1 id="total">0 BDT</h1>
    </div>

    <div class="card list-card">
      <h2>📋 Expense List</h2>
      <ul id="list"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
