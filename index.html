<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker Pro</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">

  <h1>💰 Expense Tracker</h1>

  <div id="setup" class="card">
    <h2>Setup</h2>
    <input id="name" placeholder="Your name">
    <button onclick="saveUser()">Start</button>
  </div>

  <div id="main" style="display:none;">

    <div class="card">
      <select id="userSelect"></select>

      <select id="monthSelect">
        <option>January</option><option>February</option>
        <option>March</option><option>April</option>
        <option>May</option><option>June</option>
        <option>July</option><option>August</option>
        <option>September</option><option>October</option>
        <option>November</option><option>December</option>
      </select>
    </div>

    <div class="card">
      <h2>Add Expense</h2>
      <input type="date" id="date">
      <input id="reason" placeholder="Reason">
      <input id="amount" type="number" placeholder="Amount">
      <button onclick="addExpense()">Add</button>
    </div>

    <div class="card total">
      <h2>Monthly Total</h2>
      <h1 id="total">0 BDT</h1>
    </div>

    <div class="card">
      <h2>All Expenses (Month)</h2>
      <ul id="list"></ul>
    </div>

    <button class="reset" onclick="resetAll()">Reset</button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
